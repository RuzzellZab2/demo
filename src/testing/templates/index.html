<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            border: 2px solid #333;
            font-size: 48px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .cell:hover {
            background-color: #f9f9f9;
        }
        .cell.x {
            color: #ff4757;
        }
        .cell.o {
            color: #2ed573;
        }
        .status {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }
        .restart-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .restart-btn:hover {
            background-color: #2980b9;
        }
        .win {
            background-color: #d4edda;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="restart-btn" onclick="restartGame()">Restart Game</button>
    </div>

        <script>
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        async function handleCellClick(event) {
            const clickedCell = event.target;
            const cellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameBoard[cellIndex] !== '' || !gameActive) {
                return;
            }

            try {
                const response = await fetch('/api/move', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ position: cellIndex })
                });

                const data = await response.json();
                
                if (response.ok) {
                    updateBoard(data.board);
                    currentPlayer = data.current_player;
                    
                    if (data.game_over) {
                        gameActive = false;
                        if (data.winner) {
                            statusDisplay.textContent = `Player ${data.winner} wins!`;
                            highlightWinningCells(data.board);
                        } else {
                            statusDisplay.textContent = "Game ended in a draw!";
                        }
                    } else {
                        statusDisplay.textContent = `Player ${data.current_player}'s turn`;
                    }
                } else {
                    console.error('Move error:', data.error);
                }
            } catch (error) {
                console.error('Network error:', error);
            }
        }

        function updateBoard(board) {
            cells.forEach((cell, index) => {
                cell.textContent = board[index];
                cell.classList.remove('x', 'o');
                if (board[index] === 'X') {
                    cell.classList.add('x');
                } else if (board[index] === 'O') {
                    cell.classList.add('o');
                }
            });
        }

        function highlightWinningCells(board) {
            winPatterns.forEach(pattern => {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    pattern.forEach(index => {
                        cells[index].classList.add('win');
                    });
                }
            });
        }

        async function restartGame() {
            try {
                const response = await fetch('/api/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    gameActive = true;
                    currentPlayer = data.current_player;
                    gameBoard = data.board;
                    statusDisplay.textContent = `Player ${data.current_player}'s turn`;
                    
                    cells.forEach(cell => {
                        cell.textContent = '';
                        cell.classList.remove('x', 'o', 'win');
                    });
                }
            } catch (error) {
                console.error('Reset error:', error);
            }
        }

        async function loadGameState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                
                if (response.ok) {
                    updateBoard(data.board);
                    currentPlayer = data.current_player;
                    gameBoard = data.board;
                    gameActive = !data.game_over;
                    
                    if (data.game_over) {
                        if (data.winner) {
                            statusDisplay.textContent = `Player ${data.winner} wins!`;
                            highlightWinningCells(data.board);
                        } else {
                            statusDisplay.textContent = "Game ended in a draw!";
                        }
                    } else {
                        statusDisplay.textContent = `Player ${data.current_player}'s turn`;
                    }
                }
            } catch (error) {
                console.error('Load state error:', error);
            }
        }

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        window.addEventListener('load', loadGameState);
    </script>
</body>
</html>
