<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-brain"></i> Memory Game</h1>
        </header>

        <main>
            <div class="game-controls">
                <div class="size-selector">
                    <button id="size4x4" class="size-btn active">4x4 (8 пар)</button>
                    <button id="size6x6" class="size-btn">6x6 (18 пар)</button>
                </div>
                
                <div class="stats">
                    <div class="stat">
                        <i class="fas fa-clock"></i>
                        <span>Время:</span>
                        <span id="timer">00:00</span>
                    </div>
                    <div class="stat">
                        <i class="fas fa-shoe-prints"></i>
                        <span>Ходы:</span>
                        <span id="moves">0</span>
                    </div>
                    <div class="stat">
                        <i class="fas fa-trophy"></i>
                        <span>Лучший:</span>
                        <span id="best-result">-</span>
                    </div>
                </div>

                <button id="new-game" class="new-game-btn">
                    <i class="fas fa-redo"></i> Новая игра
                </button>
            </div>

            <div class="game-board" id="game-board">
                <!-- Карточки будут добавлены через JS -->
            </div>

            <div class="message" id="message">
                <div class="message-content">
                    <h2 id="message-title">Поздравляем!</h2>
                    <p id="message-text">Вы нашли все пары!</p>
                    <div class="message-stats">
                        <p><i class="fas fa-clock"></i> Время: <span id="final-time">00:00</span></p>
                        <p><i class="fas fa-shoe-prints"></i> Ходы: <span id="final-moves">0</span></p>
                    </div>
                    <button id="play-again" class="play-again-btn">Играть снова</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Найдите все пары карточек как можно быстрее и с меньшим количеством ходов!</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
